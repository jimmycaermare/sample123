<!DOCTYPE html>
<html>
 <script>
document.addEventListener('contextmenu', event => event.preventDefault());
</script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Caermare Mind Games</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#ff9a9e,#fad0c4);color:#333;text-align:center;transition:background 0.5s;overflow-x:hidden}
.container{max-width:500px;margin:auto;padding:20px}
.card{background:#fff;border-radius:15px;padding:20px;box-shadow:0 4px 10px rgba(0,0,0,0.2)}
h1{color:#fff}
button{display:block;width:100%;margin:10px 0;padding:12px;border:none;border-radius:10px;background:#ff758c;color:#fff;font-size:16px}
button:hover{background:#ff5252}
#resultPopup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:9999;text-align:center}
#resultPopup h2{margin-bottom:10px}
#resultPopup p{margin:5px 0}
.confetti-piece{position:fixed;width:10px;height:10px;background:yellow;opacity:0.9;z-index:9998;pointer-events:none}
#overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9997}
</style>
</head>
<body>
<h1>🧠 JIMMY CAERMARE MIND GAMES</h1>
<div class="container">
<div class="card">
<h2 id="question">Loading...</h2>
<div id="answers"></div>
<p>Score: <span id="score">0</span></p>
</div>
</div>

<div id="overlay"></div>
<div id="resultPopup">
<h2>Quiz Finished!</h2>
<p id="scorePopup"></p>
<p id="greetingPopup"></p>
<button onclick="closePopup()">Close</button>
</div>

<script>
let score = 0;
let current = 0;

// 20 Bisaya questions about Filipino culture
let questions = [
 {q:"Unsa ang national language sa Pilipinas?",options:["Filipino","English","Bisaya","Ilocano"],answer:"Filipino"},
 {q:"Unsa ang tawag sa pista sa Cebu?",options:["Ati-Atihan","Sinulog","MassKara","Pahiyas"],answer:"Sinulog"},
 {q:"Kinsa ang bayani nga nagsulat sa Noli Me Tangere?",options:["Bonifacio","Rizal","Aguinaldo","Lapu-Lapu"],answer:"Rizal"},
 {q:"Unsa ang tawag sa tradisyon nga pag-ampo ug pagpa-bless sa kamot sa tigulang?",options:["Mano","Beso","Saludo","Apo"],answer:"Mano"},
 {q:"Unsa ang balay nga tradisyonal nga kawayan ug nipa?",options:["Bahay Kubo","Bungalow","Villa","Apartment"],answer:"Bahay Kubo"},
 {q:"Unsa ang kilalang sayaw sa Negros nga festival?",options:["Sinulog","Ati-Atihan","MassKara","Pahiyas"],answer:"MassKara"},
 {q:"Kinsa ang unang presidente sa Pilipinas?",options:["Rizal","Bonifacio","Aguinaldo","Lapu-Lapu"],answer:"Aguinaldo"},
 {q:"Unsa ang tawag sa tradisyon sa pagdaug sa pista pinaagi sa dekorasyon sa mga balay?",options:["Pahiyas","Sinulog","Ati-Atihan","MassKara"],answer:"Pahiyas"},
 {q:"Unsa ang bayani nga nakig-away sa Mactan?",options:["Rizal","Bonifacio","Aguinaldo","Lapu-Lapu"],answer:"Lapu-Lapu"},
 {q:"Unsa ang tawag sa tradisyonal nga pan de sal?",options:["Pandesal","Baguette","Pancho","Loaf"],answer:"Pandesal"},
 {q:"Unsa ang tawag sa festival sa Kalibo?",options:["Sinulog","Ati-Atihan","Pahiyas","MassKara"],answer:"Ati-Atihan"},
 {q:"Kinsa ang national hero nga usa ka doktor?",options:["Rizal","Bonifacio","Aguinaldo","Lapu-Lapu"],answer:"Rizal"},
 {q:"Unsa ang tawag sa tradisyonal nga bata nga gigamit sa fiesta?",options:["Parol","Belen","Kandila","Palaspas"],answer:"Parol"},
 {q:"Unsa ang kilalang tradisyon sa Simbang Gabi?",options:["Pasko","Semana Santa","Sinulog","Pahiyas"],answer:"Pasko"},
 {q:"Unsa ang tawag sa tradisyonal nga damit sa Pilipina?",options:["Baro't Saya","Kimono","Cheongsam","Hanbok"],answer:"Baro't Saya"},
 {q:"Unsa ang tradisyon sa pagdaug sa pista pinaagi sa maskara?",options:["MassKara","Sinulog","Ati-Atihan","Pahiyas"],answer:"MassKara"},
 {q:"Unsa ang national fruit sa Pilipinas?",options:["Mango","Banana","Apple","Durian"],answer:"Mango"},
 {q:"Unsa ang tawag sa tradisyonal nga kasal sa Pilipinas?",options:["Kasal","Wedding","Marriage","Seremony"],answer:"Kasal"},
 {q:"Kinsa ang kilalang Pilipinong sundalo ug bayani sa panahon sa Digmaang Pilipino-Amerikano?",options:["Rizal","Bonifacio","Aguinaldo","Lapu-Lapu"],answer:"Bonifacio"},
 {q:"Unsa ang tawag sa tradisyonal nga bangka sa Pilipinas?",options:["Bangka","Canoe","Sampan","Boat"],answer:"Bangka"}
];

function loadQuestion(){
  if(current >= questions.length){
    document.getElementById('question').innerText = "Quiz Finished!";
    document.getElementById('answers').innerHTML = "";
    document.body.style.background = "linear-gradient(135deg,#00c9ff,#92fe9d)";

    // Grading system
    let grade = '';
    let percentage = (score / questions.length) * 100;
    if(percentage >= 90) grade = 'A';
    else if(percentage >= 80) grade = 'B';
    else if(percentage >= 70) grade = 'C';
    else if(percentage >= 60) grade = 'D';
    else grade = 'F';

    // Greetings
    let greeting = '';
    if(grade === 'A') greeting = '🎉 Maayo kaayo! Padayon sa pagkat-on!';
    else if(grade === 'B') greeting = '👍 Maayo! Ayaw kalimot sa pagpraktis!';
    else if(grade === 'C') greeting = '🙂 Okay ra! Pwede pa nimo mapalambo!';
    else if(grade === 'D') greeting = '😐 Kinahanglan pa ug dugang praktis.';
    else greeting = '😞 Ayaw kawala ug paglaum, sugdi usab!';

    // Show popup
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('resultPopup').style.display = 'block';
    document.getElementById('scorePopup').innerText = `Score: ${score}/${questions.length} (${percentage.toFixed(1)}%) - Grade: ${grade}`;
    document.getElementById('greetingPopup').innerText = greeting;

    if(grade === 'A') launchConfetti();

    return;
  }
  let q = questions[current];
  document.getElementById('question').innerText = q.q;
  let html = "";
  q.options.forEach(opt => {
    html += `<button onclick="check('${opt}')">${opt}</button>`;
  });
  document.getElementById('answers').innerHTML = html;
}

function check(ans){
  if(ans === questions[current].answer){
    score++;
  }
  document.getElementById('score').innerText = score;
  current++;
  loadQuestion();
}

function launchConfetti(){
  for(let i=0;i<150;i++){
    let confetti = document.createElement('div');
    confetti.classList.add('confetti-piece');
    confetti.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
    confetti.style.left = Math.random()*window.innerWidth+'px';
    confetti.style.top = Math.random()*-50+'px';
    confetti.style.width = confetti.style.height = Math.random()*10+5+'px';
    document.body.appendChild(confetti);
    let fall = setInterval(()=>{
      let top = parseFloat(confetti.style.top);
      if(top>window.innerHeight){ confetti.remove(); clearInterval(fall); }
      else confetti.style.top = top + 5 + 'px';
    },30);
  }
}

function closePopup(){
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('resultPopup').style.display = 'none';
}

loadQuestion();
</script>
</body>
</html>
